services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    environment:
      POSTGRES_DB: clickcollect
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d clickcollect"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Symfony / PHP-FPM) ──────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend/Dockerfile
    container_name: cc_backend
    volumes:
      - ./apps/backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:app@postgres:5432/clickcollect?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
      MAILER_DSN: "smtp://mailpit:1025"
      JWT_SECRET_KEY: /var/www/backend/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/backend/config/jwt/public.pem
      JWT_PASSPHRASE: changeme_jwt_passphrase
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Nginx (reverse proxy backend) ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cc_nginx
    ports:
      - "8000:80"
    volumes:
      - ./apps/backend/public:/var/www/backend/public:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    container_name: cc_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://nginx
      WATCHPACK_POLLING: "true"
    depends_on:
      - nginx

  # ─── Mailpit (SMTP local) ─────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: cc_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # ─── Scraper mg.tn (one-shot Python tool) ────────────────────────────────────
  scraper:
    profiles:
      - tools
    build:
      context: .
      dockerfile: docker/scraper/Dockerfile
    container_name: cc_scraper
    working_dir: /workspace
    volumes:
      - .:/workspace

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
  frontend_next:
