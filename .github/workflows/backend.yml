name: Backend CI

on:
  push:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'apps/backend/**'

defaults:
  run:
    working-directory: apps/backend

jobs:
  quality:
    name: Quality & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clickcollect_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, intl, zip, bcmath
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/backend/vendor
          key: composer-${{ hashFiles('apps/backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Lint container
        run: php bin/console lint:container
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://app:app@localhost:5432/clickcollect?serverVersion=16
          JWT_PASSPHRASE: changeme_jwt_passphrase

      - name: Migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://app:app@localhost:5432/clickcollect?serverVersion=16
          JWT_PASSPHRASE: changeme_jwt_passphrase

      - name: PHPUnit
        run: php bin/phpunit
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://app:app@localhost:5432/clickcollect?serverVersion=16
          JWT_PASSPHRASE: changeme_jwt_passphrase
