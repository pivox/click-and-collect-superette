security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/auth/login
            stateless: true
            user_checker: App\Security\DeletedUserChecker
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            user_checker: App\Security\DeletedUserChecker
            jwt: ~

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register/customer$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/auth/password-reset/request$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/auth/password-reset/confirm$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/auth/forgot-password$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/auth/reset-password$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/docs(?:\..+)?$, roles: PUBLIC_ACCESS }
        - { path: ^/api/stores/by-qr, roles: PUBLIC_ACCESS }
        - { path: ^/api/stores/search$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/stores/[^/]+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/stores/[^/]+/theme$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/stores/[^/]+/opening-hours$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/stores/[^/]+/catalog$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/stores/[^/]+/pickup-slots$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/me/, roles: ROLE_CUSTOMER }
        - { path: ^/api/merchant, roles: ROLE_MERCHANT }
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
